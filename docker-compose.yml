version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: roombooking_db
    environment:
      POSTGRES_DB: roombooking
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d roombooking"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: roombooking_app
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=roombooking;Username=app_user;Password=app_password
      - Jwt__Key=super-secret-key-for-test-task-min-32-chars!!
      - Jwt__Issuer=roombooking-service
      - Jwt__Audience=roombooking-clients
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/_info"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: