services:
  postgres:
    image: postgres:15-alpine
    container_name: roombooking_db
    environment:
      POSTGRES_DB: roombooking
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d roombooking"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: